[project]
name = "churn-predictor"
version = "0.1.0"
description = ""
authors = [
    {name = "Raphael Lima", email = "raphafl@gmail.com"}
]
requires-python = "~3.12"
dependencies = ["python-dotenv (>=1.2.2,<2.0.0)", "structlog (>=25.5.0,<26.0.0)", "colorama (>=0.4.6,<0.5.0)", "pandas (>=3.0.2,<4.0.0)", "numpy (>=2.4.4,<3.0.0)", "pyarrow (>=24.0.0,<25.0.0)"]

[tool.poetry]
packages = [{ include = "churn_predictor", from = "src" }]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
[dependency-groups]
dev = [
    "ipykernel (>=7.2.0,<8.0.0)",
    "matplotlib (>=3.10.9,<4.0.0)",
    "seaborn (>=0.13.2,<0.14.0)",
    "jupyter (>=1.1.1,<2.0.0)"
]
